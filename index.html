
<style>
  .dash { padding: 1.5rem 0; font-family: var(--font-sans); }
  .section-label { font-size: 13px; color: var(--color-text-secondary); font-weight: 500; margin: 0 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .week-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 1.25rem; }
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .metric-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
  .metric-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2.5rem; }
  .chart-box { }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 10px; font-size: 12px; color: var(--color-text-secondary); }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 2rem 0; }
  .comparison-section { margin-top: 0; }
  .comp-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 1.25rem; }
</style>

<div class="dash">

  <!-- WEEK 1 -->
  <p class="section-label">Week beginning</p>
  <p class="week-title">9th March 2026</p>
  <div class="metrics">
    <div class="metric"><p class="metric-label">Total visitors</p><p class="metric-val">54</p></div>
    <div class="metric"><p class="metric-label">Top channel</p><p class="metric-val">TikTok</p></div>
    <div class="metric"><p class="metric-label">Digital</p><p class="metric-val">32</p></div>
    <div class="metric"><p class="metric-label">Physical</p><p class="metric-val">22</p></div>
  </div>

  <div class="charts-row">
    <div class="chart-box">
      <div class="legend" id="leg1"></div>
      <div style="position:relative;width:100%;height:220px;"><canvas id="pie1"></canvas></div>
    </div>
    <div class="chart-box">
      <div style="position:relative;width:100%;height:260px;"><canvas id="bar1"></canvas></div>
    </div>
  </div>

  <hr class="divider">

  <!-- WEEK 2 -->
  <p class="section-label">Week beginning</p>
  <p class="week-title">16th March 2026</p>
  <div class="metrics">
    <div class="metric"><p class="metric-label">Total visitors</p><p class="metric-val">54</p></div>
    <div class="metric"><p class="metric-label">Top channel</p><p class="metric-val">Passing By</p></div>
    <div class="metric"><p class="metric-label">Digital</p><p class="metric-val">32</p></div>
    <div class="metric"><p class="metric-label">Physical</p><p class="metric-val">22</p></div>
  </div>

  <div class="charts-row">
    <div class="chart-box">
      <div class="legend" id="leg2"></div>
      <div style="position:relative;width:100%;height:220px;"><canvas id="pie2"></canvas></div>
    </div>
    <div class="chart-box">
      <div style="position:relative;width:100%;height:260px;"><canvas id="bar2"></canvas></div>
    </div>
  </div>

  <hr class="divider">

  <!-- COMPARISON -->
  <p class="comp-title">Week-on-week comparison</p>
  <div style="position:relative;width:100%;height:320px;"><canvas id="barComp"></canvas></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['TikTok','Google','Passing By','Website','Returning','Facebook','Instagram','Word of Mouth','Hotels','Tour Guide','Other Social'];
const w1 = [14,12,10,6,10,2,0,0,0,0,0];
const w2 = [11,8,11,7,11,2,3,1,0,0,0];

const palette = ['#534AB7','#1D9E75','#378ADD','#D85A30','#BA7517','#D4537E','#639922','#888780','#B5D4F4','#9FE1CB','#F5C4B3'];

function onlyActive(data) {
  return labels.map((l,i) => ({l, v: data[i]})).filter(x => x.v > 0);
}

function buildLegend(containerId, data) {
  const active = onlyActive(data);
  const total = active.reduce((s,x) => s+x.v, 0);
  const el = document.getElementById(containerId);
  el.innerHTML = active.map((x,i) => {
    const pct = Math.round(x.v/total*100);
    return `<span class="leg-item"><span class="leg-swatch" style="background:${palette[labels.indexOf(x.l)]}"></span>${x.l} ${pct}%</span>`;
  }).join('');
}

function buildPie(id, data) {
  const active = onlyActive(data);
  new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: {
      labels: active.map(x=>x.l),
      datasets: [{ data: active.map(x=>x.v), backgroundColor: active.map(x=>palette[labels.indexOf(x.l)]), borderWidth: 2, borderColor: 'transparent' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '58%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}` } } }
    }
  });
}

function buildBar(id, data) {
  const active = onlyActive(data);
  new Chart(document.getElementById(id), {
    type: 'bar',
    data: {
      labels: active.map(x=>x.l),
      datasets: [{ data: active.map(x=>x.v), backgroundColor: active.map(x=>palette[labels.indexOf(x.l)]), borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { stepSize: 2, color: '#888780' }, grid: { color: 'rgba(136,135,128,0.15)' } },
        y: { ticks: { color: '#888780', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });
}

buildLegend('leg1', w1);
buildPie('pie1', w1);
buildBar('bar1', w1);
buildLegend('leg2', w2);
buildPie('pie2', w2);
buildBar('bar2', w2);

new Chart(document.getElementById('barComp'), {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [
      { label: '9 Mar', data: w1, backgroundColor: '#534AB7', borderRadius: 3 },
      { label: '16 Mar', data: w2, backgroundColor: '#1D9E75', borderRadius: 3 }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false }
    },
    scales: {
      x: { ticks: { color: '#888780', font: { size: 11 }, maxRotation: 30 }, grid: { display: false } },
      y: { beginAtZero: true, ticks: { stepSize: 2, color: '#888780' }, grid: { color: 'rgba(136,135,128,0.15)' } }
    }
  }
});

const compLeg = document.createElement('div');
compLeg.className = 'legend';
compLeg.style.marginTop = '10px';
compLeg.innerHTML = `<span class="leg-item"><span class="leg-swatch" style="background:#534AB7"></span>9 Mar</span><span class="leg-item"><span class="leg-swatch" style="background:#1D9E75"></span>16 Mar</span>`;
document.getElementById('barComp').parentElement.after(compLeg);
</script>
